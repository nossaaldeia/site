<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Roda de Conversas para Mães · Nossa Aldeia</title>

<link rel="icon" type="image/png" href="https://i.ibb.co/yFnvC8ch/logo-2.png" />

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
:root{
  --bege: #C3B296;
  --bege-soft: #D4C4A8;
  --bege-warm: #E8DDC9;
  --musgo: #6A6B4B;
  --musgo-dark: #5A5B3F;
  --musgo-deep: #3F4030;
  --terracota: #895240;
  --terracota-soft: #B97A66;
  --dourado: #A79172;
  --dourado-light: #C7B49A;
  --ink: #2B2B2B;
  --ink-soft: #4A463F;
  --paper: #F5F2ED;
  --paper-warm: #EDE6D8;
  --rule: #E5DED4;
  --white: #FBF9F4;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--paper);color:var(--ink);font-family:'Poppins',system-ui,sans-serif;font-size:17px;line-height:1.6;-webkit-font-smoothing:antialiased}
body{
  /* subtle paper grain */
  background-image:
    radial-gradient(circle at 12% 8%, rgba(167,145,114,.08), transparent 40%),
    radial-gradient(circle at 88% 92%, rgba(137,82,64,.06), transparent 45%),
    url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='180' height='180'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4  0 0 0 0 0.35  0 0 0 0 0.25  0 0 0 0.04 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
}
img{display:block;max-width:100%}
button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
a{color:inherit;text-decoration:none}
h1,h2,h3,h4{font-family:'Poppins',sans-serif;color:var(--musgo-deep);text-wrap:balance;letter-spacing:-0.01em}
.serif{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;letter-spacing:0}
::selection{background:var(--musgo);color:var(--white)}

/* ---------- layout ---------- */
.wrap{max-width:1240px;margin:0 auto;padding:0 28px}
.section{padding:96px 0;position:relative}
.section--tight{padding:72px 0}
.eyebrow{
  display:inline-flex;align-items:center;gap:10px;
  font-size:13px;letter-spacing:.18em;text-transform:uppercase;
  color:var(--dourado);font-weight:500;
}
.eyebrow::before{content:"";width:28px;height:1px;background:var(--dourado)}
.divider-gold{width:64px;height:1px;background:var(--dourado);margin:24px 0}
.divider-gold--center{margin:24px auto}

/* ---------- nav ---------- */
.nav{
  position:sticky;top:0;z-index:50;
  background:rgba(245,242,237,.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--rule);
}
.nav__inner{display:flex;align-items:center;justify-content:space-between;padding:18px 28px;max-width:1240px;margin:0 auto}
.nav__logo{display:flex;align-items:center;gap:10px;font-family:'Poppins';font-weight:600;color:var(--musgo-deep);letter-spacing:.04em}
.nav__logo img{height:38px;width:auto}
.nav__links{display:flex;gap:32px;align-items:center;font-size:14.5px;color:var(--ink-soft)}
.nav__links a{transition:color .2s}
.nav__links a:hover{color:var(--musgo)}
.nav__cta{
  background:var(--musgo);color:var(--white);
  padding:11px 20px;border-radius:10px;font-size:14px;font-weight:500;
  transition:all .2s;
}
.nav__cta:hover{background:var(--musgo-dark);transform:translateY(-1px)}
@media (max-width:840px){.nav__links{display:none}}

/* ---------- hero ---------- */
.hero{
  background:var(--bege);
  padding:90px 0 110px;
  position:relative;overflow:hidden;
}
.hero::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(ellipse 700px 500px at 88% 30%, rgba(137,82,64,.18), transparent 60%),
    radial-gradient(ellipse 600px 400px at 8% 80%, rgba(106,107,75,.22), transparent 60%);
  pointer-events:none;
}
.hero__grid{display:grid;grid-template-columns:1.05fr .95fr;gap:72px;align-items:center;position:relative}
.hero__eyebrow{color:var(--terracota)}
.hero__eyebrow::before{background:var(--terracota)}
.hero h1{
  font-size:clamp(40px,5vw,60px);
  line-height:1.08;font-weight:600;
  color:var(--musgo-deep);
  margin:18px 0 24px;
}
.hero h1 .em{color:var(--terracota);font-weight:600}
.hero__sub{font-size:18.5px;color:var(--ink-soft);max-width:540px;margin-bottom:36px;line-height:1.65}
.hero__ctas{display:flex;gap:14px;flex-wrap:wrap;align-items:center}
.btn{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 28px;border-radius:10px;font-weight:500;font-size:15.5px;
  transition:all .22s ease;cursor:pointer;
}
.btn--primary{background:var(--musgo);color:var(--white);box-shadow:0 6px 18px -8px rgba(63,64,48,.5)}
.btn--primary:hover{background:var(--musgo-dark);transform:translateY(-1px) scale(1.01);box-shadow:0 10px 24px -10px rgba(63,64,48,.55)}
.btn--secondary{background:transparent;color:var(--musgo);border:1.5px solid var(--musgo)}
.btn--secondary:hover{background:var(--musgo);color:var(--white)}
.btn--terracota{background:var(--terracota);color:var(--white)}
.btn--terracota:hover{background:#75432F}
.btn__arrow{transition:transform .2s}
.btn:hover .btn__arrow{transform:translateX(3px)}
.hero__micro{font-size:14px;color:var(--ink-soft);margin-top:14px;opacity:.85}
.hero__trust{display:flex;gap:24px;margin-top:42px;padding-top:28px;border-top:1px solid rgba(63,64,48,.18);flex-wrap:wrap}
.hero__trust-item{display:flex;flex-direction:column}
.hero__trust-item strong{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:28px;color:var(--musgo-deep);line-height:1}
.hero__trust-item span{font-size:13px;color:var(--ink-soft);margin-top:4px}

/* hero visual — clean collage */
.hero-art{position:relative;aspect-ratio:1/1.05;max-width:520px;margin-left:auto;width:100%}
.hero-art__photo{
  position:absolute;border-radius:18px;overflow:hidden;
  box-shadow:0 30px 60px -28px rgba(63,64,48,.45);
  background:var(--paper-warm);
}
.hero-art__photo img{width:100%;height:100%;object-fit:cover}
.hero-art__photo--1{top:0;left:0;width:62%;height:62%;border-radius:50% 50% 50% 50% / 60% 60% 40% 40%}
.hero-art__photo--2{bottom:0;right:0;width:55%;height:55%;border-radius:50%}
.hero-art__chip{
  position:absolute;background:var(--white);border:1px solid var(--rule);
  border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:12px;
  box-shadow:0 18px 40px -20px rgba(63,64,48,.3);
}
.hero-art__chip--top{top:8%;right:6%}
.hero-art__chip--bot{bottom:14%;left:0;}
.hero-art__chip-dot{width:9px;height:9px;border-radius:50%;background:var(--musgo);position:relative;flex:0 0 9px}
.hero-art__chip-dot::after{content:"";position:absolute;inset:-4px;border-radius:50%;background:var(--musgo);opacity:.3;animation:pulse 2s infinite}
@keyframes pulse{0%{transform:scale(1);opacity:.4}100%{transform:scale(2);opacity:0}}
.hero-art__chip-text{font-size:13px;line-height:1.3}
.hero-art__chip-text strong{display:block;color:var(--musgo-deep);font-weight:600}
.hero-art__chip-text span{color:var(--ink-soft);font-size:12px}
.hero-art__leaf{position:absolute;color:var(--dourado);opacity:.7}

@media (max-width:980px){
  .hero__grid{grid-template-columns:1fr;gap:56px}
  .hero-art{margin:0 auto;max-width:420px}
}

/* ---------- proposta de valor ---------- */
.value{background:var(--paper);position:relative}
.value__inner{max-width:820px;margin:0 auto;text-align:center}
.value h2{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:400;
  font-size:clamp(28px,3.4vw,40px);line-height:1.35;color:var(--musgo-deep);
  margin:24px 0;
}
.value__lead{font-size:18px;color:var(--ink-soft);margin-bottom:24px;line-height:1.75}
.value__lead strong{color:var(--terracota);font-weight:500;font-style:normal;font-family:'Poppins'}
.value__quote{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:26px;color:var(--musgo);margin-top:36px;
}
.value__quote em{color:var(--terracota);font-weight:500}
.value__beats{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin:36px 0 8px;text-align:left}
.value-beat{
  background:var(--white);border:1px solid var(--rule);border-radius:14px;
  padding:24px 22px;display:flex;flex-direction:column;gap:6px;
  transition:transform .25s,border-color .25s,box-shadow .25s;position:relative;overflow:hidden;
}
.value-beat::before{
  content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--dourado);opacity:.6;
}
.value-beat:hover{transform:translateY(-3px);border-color:var(--dourado);box-shadow:0 18px 40px -22px rgba(63,64,48,.25)}
.value-beat__k{font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:30px;color:var(--dourado);line-height:1}
.value-beat__t{font-size:17px;font-weight:600;color:var(--musgo-deep);margin-top:6px}
.value-beat__d{font-size:14px;color:var(--ink-soft);line-height:1.5}
@media (max-width:780px){.value__beats{grid-template-columns:1fr}}

/* ---------- pain points ---------- */
.pain{background:var(--paper-warm);position:relative;overflow:hidden}
.pain::before{
  content:"";position:absolute;top:-150px;right:-100px;width:400px;height:400px;
  border-radius:50%;background:radial-gradient(circle,rgba(137,82,64,.1),transparent 70%);
}
.pain__head{max-width:720px;margin:0 auto 56px;text-align:center;position:relative}
.pain__head h2{font-size:clamp(30px,3.6vw,42px);font-weight:600;line-height:1.3}
.pain__grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;position:relative}
.pain__card{
  background:var(--white);padding:26px 22px;border-radius:14px;
  border:1px solid var(--rule);
  display:flex;flex-direction:column;gap:14px;
  transition:transform .25s, box-shadow .25s, border-color .25s;
  cursor:default;
}
.pain__card:hover{transform:translateY(-3px);border-color:var(--terracota-soft);box-shadow:0 18px 40px -22px rgba(137,82,64,.3)}
.pain__icon{width:42px;height:42px;border-radius:50%;background:var(--bege-warm);display:flex;align-items:center;justify-content:center;color:var(--terracota)}
.pain__card p{font-size:15px;line-height:1.5;color:var(--ink-soft)}
.pain__bottom{
  margin-top:48px;text-align:center;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:24px;color:var(--terracota);
}
.pain__bottom strong{font-family:'Poppins';font-style:normal;font-weight:600;color:var(--musgo-deep);font-size:22px;display:block;margin-top:6px}
@media (max-width:880px){.pain__grid{grid-template-columns:repeat(2,1fr)}}

/* ---------- solução ---------- */
.sol{background:var(--paper);position:relative;overflow:hidden}
.sol__head{text-align:center;max-width:760px;margin:0 auto 56px}
.sol__head h2{font-size:clamp(30px,3.6vw,44px);font-weight:600;line-height:1.32;margin-top:18px}
.sol__head h2 .em{color:var(--terracota);font-style:italic;font-family:'Cormorant Garamond',serif;font-weight:400}
.sol__sub{font-size:17px;color:var(--ink-soft);margin-top:14px;line-height:1.65}
.sol__steps{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:64px;position:relative}
.sol-step{
  background:var(--white);border:1px solid var(--rule);border-radius:16px;
  padding:32px 28px;display:flex;flex-direction:column;gap:10px;
  position:relative;transition:all .25s;
}
.sol-step:hover{transform:translateY(-3px);border-color:var(--dourado);box-shadow:0 24px 50px -28px rgba(63,64,48,.25)}
.sol-step__n{
  position:absolute;top:18px;right:22px;
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
  font-size:42px;color:var(--bege-warm);line-height:1;
}
.sol-step__icon{
  width:48px;height:48px;border-radius:50%;background:var(--paper-warm);
  display:flex;align-items:center;justify-content:center;color:var(--terracota);
  margin-bottom:6px;
}
.sol-step__t{font-size:18px;font-weight:600;color:var(--musgo-deep)}
.sol-step__d{font-size:14.5px;color:var(--ink-soft);line-height:1.55}
.sol-step__arrow{
  position:absolute;right:-22px;top:50%;transform:translateY(-50%);
  font-size:24px;color:var(--dourado);z-index:2;
  background:var(--paper);width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-weight:300;
}
.sol__divider{
  display:flex;align-items:center;gap:20px;margin:0 auto 32px;max-width:600px;
}
.sol__divider::before,.sol__divider::after{content:"";flex:1;height:1px;background:var(--rule)}
.sol__divider span{font-size:13px;letter-spacing:.18em;text-transform:uppercase;color:var(--dourado);font-weight:500}
.sol__chips{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:48px;max-width:980px;margin-left:auto;margin-right:auto}
.sol-chip{
  background:var(--white);border:1px solid var(--rule);border-radius:12px;
  padding:18px 20px;display:flex;align-items:center;gap:14px;
  transition:all .2s;
}
.sol-chip:hover{border-color:var(--dourado);transform:translateX(2px)}
.sol-chip__ico{
  width:38px;height:38px;border-radius:10px;background:var(--paper-warm);
  display:flex;align-items:center;justify-content:center;color:var(--terracota);flex-shrink:0;
}
.sol-chip strong{display:block;font-size:14.5px;font-weight:600;color:var(--musgo-deep)}
.sol-chip span{display:block;font-size:13px;color:var(--ink-soft);line-height:1.4;margin-top:1px}
.sol__cta-row{display:flex;justify-content:center;align-items:center;gap:22px;flex-wrap:wrap}
.sol__cta-link{font-size:14.5px;color:var(--musgo);font-weight:500;text-decoration:underline;text-underline-offset:4px;text-decoration-color:var(--dourado);transition:color .2s}
.sol__cta-link:hover{color:var(--terracota)}
@media (max-width:880px){
  .sol__steps{grid-template-columns:1fr;gap:14px}
  .sol-step__arrow{display:none}
  .sol__chips{grid-template-columns:1fr}
}

/* ---------- quiz ---------- */
.quiz{background:var(--paper-warm);position:relative;overflow:hidden}
.quiz::before{
  content:"";position:absolute;top:-100px;right:-100px;width:380px;height:380px;
  border-radius:50%;background:radial-gradient(circle,rgba(106,107,75,.12),transparent 70%);
}
.quiz::after{
  content:"";position:absolute;bottom:-120px;left:-100px;width:320px;height:320px;
  border-radius:50%;background:radial-gradient(circle,rgba(137,82,64,.1),transparent 70%);
}
.quiz__head{text-align:center;max-width:680px;margin:0 auto 48px;position:relative}
.quiz__head h2{font-size:clamp(30px,3.6vw,42px);font-weight:600;line-height:1.3;margin-top:18px}
.quiz__head p{color:var(--ink-soft);margin-top:14px;font-size:17px}
.quiz__card{
  max-width:760px;margin:0 auto;background:var(--white);
  border:1px solid var(--rule);border-radius:20px;
  box-shadow:0 30px 60px -30px rgba(63,64,48,.25);
  padding:40px 44px;position:relative;
  min-height:480px;display:flex;flex-direction:column;
}
.quiz__progress{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.quiz__progress-bar{flex:1;height:6px;background:var(--rule);border-radius:3px;overflow:hidden}
.quiz__progress-fill{height:100%;background:var(--musgo);transition:width .35s ease}
.quiz__progress-text{font-size:12.5px;color:var(--ink-soft);font-weight:500;letter-spacing:.04em}
.quiz__step{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--dourado);font-weight:500;margin-bottom:10px}
.quiz__q{font-size:clamp(22px,2.4vw,28px);font-weight:600;color:var(--musgo-deep);line-height:1.3;margin-bottom:24px;text-wrap:balance}
.quiz__opts{display:flex;flex-direction:column;gap:10px}
.quiz__opt{
  background:var(--paper);border:1.5px solid var(--rule);border-radius:12px;
  padding:18px 22px;text-align:left;font-size:15.5px;color:var(--ink);
  display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:all .2s;
}
.quiz__opt:hover{border-color:var(--musgo);background:var(--white);transform:translateX(4px)}
.quiz__opt-letter{
  width:32px;height:32px;border-radius:50%;background:var(--white);
  border:1.5px solid var(--rule);display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;font-size:18px;
  color:var(--musgo-deep);flex-shrink:0;transition:all .2s;
}
.quiz__opt:hover .quiz__opt-letter{background:var(--musgo);color:var(--white);border-color:var(--musgo)}
.quiz__nav{display:flex;justify-content:space-between;margin-top:auto;padding-top:24px}
.quiz__back{font-size:14px;color:var(--ink-soft);background:none;border:none;cursor:pointer;display:flex;align-items:center;gap:6px}
.quiz__back:hover{color:var(--musgo)}
.quiz__back:disabled{opacity:.3;cursor:default}

.quiz__result{padding:8px 0}
.quiz__result-tag{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--dourado);font-weight:500}
.quiz__result h3{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
  font-size:clamp(34px,4vw,52px);color:var(--musgo-deep);line-height:1.05;margin:10px 0 6px;
}
.quiz__result-sub{font-size:17px;color:var(--ink-soft);margin-bottom:20px;line-height:1.55}
.quiz__result-box{
  background:var(--paper);border:1px solid var(--rule);border-radius:14px;
  padding:22px 24px;margin-top:16px;
}
.quiz__result-box h4{font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--dourado);margin-bottom:8px}
.quiz__result-box p{font-size:15px;color:var(--ink-soft);line-height:1.5}
.quiz__result-box strong{color:var(--musgo-deep);font-weight:600}
.quiz__result-ctas{display:flex;gap:12px;margin-top:28px;flex-wrap:wrap}
.quiz__restart{
  font-size:13.5px;color:var(--ink-soft);background:none;border:none;cursor:pointer;
  margin-top:14px;text-decoration:underline;text-underline-offset:3px;
}
.quiz__restart:hover{color:var(--terracota)}
.quiz__intro{text-align:center;padding:24px 0;display:flex;flex-direction:column;align-items:center}
.quiz__logo{height:72px;width:auto;margin-bottom:8px;opacity:.95}
.quiz__intro h3{font-size:24px;color:var(--musgo-deep);margin-bottom:10px;font-weight:600}
.quiz__intro p{color:var(--ink-soft);margin-bottom:24px}
.quiz__start{margin:0 auto}
.quiz__meta{
  display:flex;justify-content:center;gap:20px;margin-top:22px;font-size:13px;color:var(--ink-soft);
  flex-wrap:wrap;
}
.quiz__meta span{display:flex;align-items:center;gap:6px}
.quiz__meta strong{color:var(--musgo);font-weight:500}
@media (max-width:680px){
  .quiz__card{padding:28px 24px}
  .quiz__opt{padding:14px 16px;font-size:14.5px}
}

/* ---------- benefícios ---------- */
.benefits__head{text-align:center;max-width:680px;margin:0 auto 64px}
.benefits__head h2{font-size:clamp(30px,3.6vw,42px);font-weight:600;line-height:1.3;margin-top:18px}
.benefits__grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.benefit{
  background:var(--white);padding:32px 24px;border-radius:14px;
  border:1px solid var(--rule);
  display:flex;flex-direction:column;gap:14px;
  position:relative;overflow:hidden;
}
.benefit__num{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:48px;color:var(--dourado);line-height:1;font-weight:500;
}
